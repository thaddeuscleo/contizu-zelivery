apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: contizu-api
  namespace: contizu
spec:
  hosts:
    - "contizu.local"
  gateways:
    - contizu-gateway
  http:
    - route:
        - destination:
            host: contizu-api.contizu.svc.cluster.local
            subset: v1
            port:
              number: 80
          weight: 80
        - destination:
            host: contizu-api.contizu.svc.cluster.local
            subset: v3
            port:
              number: 80
          weight: 20
