apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: contizu-api
  namespace: contizu
spec:
  host: contizu-api.contizu.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
